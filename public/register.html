<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Registration | CEM</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, #1e3a8a, transparent 40%),
        radial-gradient(circle at bottom right, #0a2540, transparent 40%),
        linear-gradient(135deg, #020617, #0a2540);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .register-container {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      color: #333;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #555;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input,
    select {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s ease;
      background: white;
      color: #333;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    input::placeholder {
      color: #aaa;
    }

    select {
      cursor: pointer;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      color: #0a2540;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(251, 191, 36, 0.5);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #2563eb;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      color: #1e40af;
    }

    .event-info {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 25px;
      border-left: 4px solid #2563eb;
    }

    .event-info h3 {
      color: #333;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .event-info p {
      color: #666;
      font-size: 13px;
      margin: 4px 0;
    }
  </style>
</head>
<body>

<div class="register-container">
  <h2>📝 Event Registration</h2>

  <div class="event-info" id="eventInfo" style="display: none;">
    <h3 id="eventTitle">Event Name</h3>
    <p id="eventDetails"></p>
  </div>

  <form id="registerForm">
    <div class="form-group">
      <label>Student Name</label>
      <input type="text" id="studentName" placeholder="Enter your full name" required>
    </div>

    <div class="form-group">
      <label>PIN Number</label>
      <input type="text" id="pinNumber" placeholder="Enter your PIN number" required>
    </div>

    <div class="form-group">
      <label>Branch</label>
      <select id="branch" required>
        <option value="">Select Branch</option>
        <option>CSE</option>
        <option>ECE</option>
        <option>EEE</option>
        <option>MECH</option>
        <option>CIVIL</option>
        <option>IT</option>
        <option>AI</option>
        <option>DS</option>
        <option>AIML</option>
        <option>IOT</option>
      </select>
    </div>

    <div class="form-group">
      <label>Section</label>
      <select id="section" required>
        <option value="">Select Section</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
        <option>9</option>
        <option>10</option>
      </select>
    </div>
        <div class="form-group">
      <label>year</label>
      <select id="year" required>
        <option value="">Select YEAR</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
      </select>
    </div>

    <button type="submit" class="submit-btn">
      ✅ Submit Registration
    </button>
  </form>

  <a href="studentDashboard.html" class="back-link">← Back to Dashboard</a>
</div>

<script>
  // Load event info and pre-fill student data if available
  window.onload = async function() {
    // Check if student is logged in
    const studentData = localStorage.getItem('studentData');
    if (!studentData) {
      alert('Please login first');
      window.location.href = '/index.html';
      return;
    }

    const student = JSON.parse(studentData);
    const pinNumber = student.studentId || student.username;
    
    // Pre-fill PIN number from logged-in user
    document.getElementById('pinNumber').value = pinNumber;
    document.getElementById('pinNumber').readOnly = true;

    // Load event details
    const eventId = localStorage.getItem('selectedEventId');
    if (eventId) {
      try {
        const response = await fetch('/api/events');
        if (response.ok) {
          const events = await response.json();
          const event = events.find(e => e._id === eventId);
          if (event) {
            document.getElementById('eventInfo').style.display = 'block';
            document.getElementById('eventTitle').textContent = event.title;
            document.getElementById('eventDetails').innerHTML = `
              📅 ${event.date} | 🕐 ${event.time}<br>
              📍 ${event.venue}
            `;
          }
        }
      } catch (e) {
        console.error('Error loading event data:', e);
      }
    }
  };

  document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const studentName = document.getElementById("studentName").value;
    const pinNumber = document.getElementById("pinNumber").value;
    const branch = document.getElementById("branch").value;
    const section = document.getElementById("section").value;
    const year = document.getElementById("year").value;
    const eventId = localStorage.getItem("selectedEventId");

    console.log('Submitting registration:', { studentName, pinNumber, branch, section,year, eventId });

    if (!eventId) {
      alert("❌ No event selected. Please go back to student dashboard.");
      return;
    }

    if (!studentName || !pinNumber || !branch || !section) {
      alert("❌ Please fill in all fields.");
      return;
    }

    try {
      console.log('Sending request to /api/registrations');
      const response = await fetch("/api/registrations", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          studentName,
          pinNumber,
          branch,
          section,
          year,
          eventId
        })
      });

      console.log('Response status:', response.status);
      const data = await response.json();
      console.log('Response data:', data);
      
      if (response.ok) {
        alert("🎉 " + data.message);
        localStorage.removeItem("selectedEventId");
        window.location.href = "studentDashboard.html";
      } else {
        if (data.alreadyRegistered) {
          alert("⚠️ " + data.message + "\n\nYou will be redirected to the dashboard.");
          localStorage.removeItem("selectedEventId");
          window.location.href = "studentDashboard.html";
        } else {
          alert("❌ " + data.message);
        }
      }
    } catch (error) {
      console.error("Registration error:", error);
      alert("❌ Server connection error. Please check if the server is running on port 5000.");
    }
  });
</script>

</body>
</html>
