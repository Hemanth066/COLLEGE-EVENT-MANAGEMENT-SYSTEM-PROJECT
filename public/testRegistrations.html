<!DOCTYPE html>
<html>
<head>
  <title>Test Registrations</title>
</head>
<body>
  <h1>Registration Test</h1>
  <div id="output"></div>
  
  <script>
    async function test() {
      const output = document.getElementById('output');
      
      // Load events
      const eventsRes = await fetch('/api/events');
      const events = await eventsRes.json();
      output.innerHTML += `<p>Events loaded: ${events.length}</p>`;
      
      // Load registrations
      const regsRes = await fetch('/api/register/all');
      const registrations = await regsRes.json();
      output.innerHTML += `<p>Registrations loaded: ${registrations.length}</p>`;
      
      // Show first registration
      const reg = registrations[0];
      output.innerHTML += `<h3>First Registration:</h3>`;
      output.innerHTML += `<p>Student: ${reg.studentName}</p>`;
      output.innerHTML += `<p>EventId: ${reg.eventId}</p>`;
      output.innerHTML += `<p>EventId type: ${typeof reg.eventId}</p>`;
      
      // Find matching event
      const event = events.find(e => e._id === reg.eventId);
      output.innerHTML += `<p>Event found: ${event?.title || 'NOT FOUND'}</p>`;
      
      // Filter test
      const filtered = registrations.filter(r => r.eventId === events[0]._id);
      output.innerHTML += `<h3>Filter Test:</h3>`;
      output.innerHTML += `<p>Filtering by: ${events[0]._id}</p>`;
      output.innerHTML += `<p>Results: ${filtered.length} registrations</p>`;
      
      filtered.forEach((r, i) => {
        output.innerHTML += `<p>${i+1}. ${r.studentName} - ${r.pinNumber}</p>`;
      });
    }
    
    test();
  </script>
</body>
</html>
