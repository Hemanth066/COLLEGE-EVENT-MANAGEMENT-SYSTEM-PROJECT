<!DOCTYPE html>
<html>
<head>
    <title>Test Route</title>
</head>
<body>
    <h1>Test Attendance Route</h1>
    <button onclick="testRoute()">Test PUT Route</button>
    <pre id="result"></pre>

    <script>
        async function testRoute() {
            const regId = "699003afcdee2e1a596a0113";
            const url = `/api/register/attendance/${regId}`;
            
            document.getElementById('result').textContent = `Testing: ${url}\n\n`;
            
            try {
                const response = await fetch(url, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ attended: true })
                });
                
                document.getElementById('result').textContent += `Status: ${response.status}\n`;
                document.getElementById('result').textContent += `Status Text: ${response.statusText}\n\n`;
                
                const text = await response.text();
                document.getElementById('result').textContent += `Response:\n${text}`;
                
            } catch (error) {
                document.getElementById('result').textContent += `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
