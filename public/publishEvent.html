<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Publish Event | CEM</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      min-height: 100vh;
      padding: 40px 0;
      overflow-y: auto;
    }

    .publish-container {
      width: 460px;
      margin: auto;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      border-radius: 22px;
      padding: 35px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 25px 45px rgba(0,0,0,0.45);
      animation: slideUp 1s ease forwards;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 14px;
    }

    .form-group label {
      font-size: 13px;
      margin-bottom: 4px;
      opacity: 0.85;
    }

    textarea {
      resize: none;
      height: 80px;
    }

    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(35px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<div class="publish-container">

  <h2>📅 Publish New Event</h2>

  <div class="form-group">
    <label>Event Title</label>
    <input type="text" id="title">
  </div>

  <div class="form-group">
    <label>Event Description</label>
    <textarea id="description"></textarea>
  </div>

  <div class="form-group">
    <label>Event Venue</label>
    <input type="text" id="venue">
  </div>

  <div class="two-column">
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="date">
    </div>

    <div class="form-group">
      <label>Time</label>
      <input type="time" id="time">
    </div>
  </div>

  <div class="form-group">
    <label>Registration Deadline <span style="color: #ef4444;">*</span></label>
    <input type="datetime-local" id="registrationDeadline" required>
    <small style="font-size: 11px; opacity: 0.7; margin-top: 4px; display: block;">
      Events will automatically disappear from student view after this deadline
    </small>
  </div>

  <div class="two-column">
    <div class="form-group">
      <label>Faculty Coordinator</label>
      <input type="text" id="faculty">
    </div>

    <div class="form-group">
      <label>Faculty Phone</label>
      <input type="tel" id="facultyPhone">
    </div>
  </div>

  <div class="two-column">
    <div class="form-group">
      <label>Student Coordinator</label>
      <input type="text" id="student">
    </div>

    <div class="form-group">
      <label>Student Phone</label>
      <input type="tel" id="studentPhone">
    </div>
  </div>

  <button class="login-btn" onclick="publishEvent()">
    🚀 Publish Event
  </button>

  <button class="login-btn" onclick="location.href='facultyDashboard.html'" style="background: rgba(255,255,255,0.15); margin-top: 10px;">
    ⬅ Back to Dashboard
  </button>

</div>

<script>
async function publishEvent() {
  const eventData = {
    title: title.value,
    description: description.value,
    venue: venue.value,
    date: date.value,
    time: time.value,
    faculty: faculty.value,
    facultyPhone: facultyPhone.value,
    student: student.value,
    studentPhone: studentPhone.value,
    registrationDeadline: registrationDeadline.value
  };

  if (!eventData.title || !eventData.date || !eventData.time) {
    alert("⚠️ Please fill required fields (Title, Date, Time)");
    return;
  }

  if (!eventData.registrationDeadline) {
    alert("⚠️ Please set a registration deadline");
    return;
  }

  try {
    const response = await fetch("/api/events", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(eventData)
    });

    const result = await response.json();

    if (response.ok) {
      alert("✅ " + result.message);
      
      // Clear form
      document.querySelectorAll("input, textarea").forEach(e => e.value = "");
      
      // Redirect to dashboard after 1 second
      setTimeout(() => {
        window.location.href = "facultyDashboard.html";
      }, 1000);
    } else {
      alert("❌ " + result.message);
    }

  } catch (error) {
    alert("❌ Server error. Check backend.");
    console.error(error);
  }
}
</script>

</body>
</html>
